name: Playwright Java Tests
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ÉTAPE CRUCIALE POUR PLAYWRIGHT
      - name: Install Playwright Browsers
        run: mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install --with-deps"

      - name: Run Tests with Maven
        run: mvn test

      - name: Notify n8n of result
        if: always()
        run: |
          curl -X POST https://jobgate.app.n8n.cloud/webhook-test/resultat-selenium \
          -d "status=${{ job.status }}