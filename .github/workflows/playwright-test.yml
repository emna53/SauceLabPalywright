name: Playwright Java BDD Tests

on:
  workflow_dispatch: # Permet le déclenchement depuis n8n

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install Playwright Browsers
        run: mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install --with-deps"

      - name: Run Cucumber Tests
        run: mvn test -Dtest=TestRunner # Force l'exécution de ton Runner spécifique

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: target/cucumber-reports.html

      - name: Notify n8n of result
        if: always()
        run: |
          curl -X POST https://jobgate.app.n8n.cloud/webhook-test/resultat-selenium \
          -d "status=${{ job.status }}"